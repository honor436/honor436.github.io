<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>풀페이지 A - 둥근 탭, 상품사진 배너</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      position: relative;
    }
    .back-link {
      display: block;
      padding: 12px 16px;
      font-size: 14px;
      color: #777;
      text-decoration: none;
      background: #f5f5f5;
    }
    .back-link:hover { color: #111; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      background: #fff;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #0c8050;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f2f2f2;
      border-radius: 20px;
      padding: 8px 14px;
      gap: 8px;
    }
    .search-bar input {
      border: none;
      background: transparent;
      font-size: 13px;
      color: #777;
      outline: none;
      flex: 1;
      font-family: inherit;
    }
    .search-bar svg { flex-shrink: 0; }

    /* Pill Tab Bar */
    .tab-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #0c8050;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8);
      border: none;
    }
    .tab-item.active {
      background: #fff;
      color: #0c8050;
    }

    /* Hero Banner */
    .hero {
      position: relative;
      width: 100%;
      height: 220px;
      background: url('https://www.figma.com/api/mcp/asset/c5520ee2-ba41-47c7-ab28-3f787889bfb9') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 24px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 100%);
    }
    .hero-text {
      position: relative;
      z-index: 1;
    }
    .hero-text .sub {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 4px;
    }
    .hero-text h2 {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
    }
    .hero-text .cta {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
    }

    /* Quick Menu */
    .quick-menu {
      display: flex;
      gap: 12px;
      padding: 20px 16px 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .quick-menu::-webkit-scrollbar { display: none; }
    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 64px;
      cursor: pointer;
    }
    .quick-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quick-icon svg { width: 24px; height: 24px; stroke: #333; fill: none; }
    .quick-item span {
      font-size: 11px;
      color: #333;
      white-space: nowrap;
    }

    /* Scroll Indicator */
    .scroll-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 12px 0 20px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ddd;
    }
    .dot.active { background: #0c8050; width: 16px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="app">
    <a href="../sample.html" class="back-link">← 목록으로</a>

    <!-- Header -->
    <div class="header">
      <div class="logo">CJ더마켓</div>
      <div class="search-bar">
        <input type="text" placeholder="비비고 왕교자 70%" readonly>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>

    <!-- Pill Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="deals">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
    </div>

    <!-- Hero Banner -->
    <div class="hero">
      <div class="hero-text">
        <div class="sub">고객감사제</div>
        <h2>최대<br>시크릿특가</h2>
        <div class="cta">지금 보러가기 &gt;</div>
      </div>
    </div>

    <!-- Quick Menu -->
    <div class="quick-menu">
      <div class="quick-item">
        <div class="quick-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12l3 3 5-5"/></svg>
        </div>
        <span>오아시스루트</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6"/><path d="M12 2l8 6H4l8-6z"/><line x1="12" y1="8" x2="12" y2="20"/></svg>
        </div>
        <span>선물하기</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <span>컨셉장보기</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </div>
        <span>라이브쇼핑</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        </div>
        <span>대용량</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <span>자주구매</span>
      </div>
    </div>

    <!-- Scroll Dots -->
    <div class="scroll-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
