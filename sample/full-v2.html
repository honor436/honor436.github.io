<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>풀페이지 B - Yummy Time 풀배너 + 패션 퀵메뉴</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
    }
    .back-link {
      display: block;
      padding: 12px 16px;
      font-size: 14px;
      color: #777;
      text-decoration: none;
      background: #f5f5f5;
    }
    .back-link:hover { color: #111; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      background: #fff;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #0c8050;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f2f2f2;
      border-radius: 20px;
      padding: 8px 14px;
      gap: 8px;
    }
    .search-bar input {
      border: none;
      background: transparent;
      font-size: 13px;
      color: #777;
      outline: none;
      flex: 1;
      font-family: inherit;
    }
    .cart-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Text Tab Bar */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      color: #999;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #111;
      font-weight: 700;
      border-bottom-color: #111;
    }

    /* Hero Banner */
    .hero {
      position: relative;
      width: 100%;
      height: 280px;
      background: url('https://www.figma.com/api/mcp/asset/627b2325-7afb-44f5-980a-ce5f792f6e5d') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 24px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(12,128,80,0.6) 0%, rgba(0,0,0,0.2) 100%);
    }
    .hero-text {
      position: relative;
      z-index: 1;
    }
    .hero-label {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 11px;
      color: #fff;
      margin-bottom: 12px;
      backdrop-filter: blur(4px);
    }
    .hero-text h2 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .hero-text .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }

    /* Quick Menu - Fashion Style */
    .quick-menu {
      display: flex;
      gap: 10px;
      padding: 20px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .quick-menu::-webkit-scrollbar { display: none; }
    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 72px;
      cursor: pointer;
    }
    .quick-thumb {
      width: 68px;
      height: 68px;
      border-radius: 12px;
      overflow: hidden;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .quick-thumb .thumb-icon {
      font-size: 28px;
    }
    .quick-thumb .badge {
      position: absolute;
      top: 4px;
      left: 4px;
      background: #ff3b30;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
    }
    .quick-item span {
      font-size: 11px;
      color: #333;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="app">
    <a href="../sample.html" class="back-link">← 목록으로</a>

    <!-- Header -->
    <div class="header">
      <div class="logo">CJ더마켓</div>
      <div class="search-bar">
        <input type="text" placeholder="검색어를 입력하세요" readonly>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="cart-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      </div>
    </div>

    <!-- Text Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item" data-tab="live">라이브</div>
      <div class="tab-item" data-tab="deals">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
      <div class="tab-item" data-tab="mag">매거진</div>
    </div>

    <!-- Hero Banner -->
    <div class="hero">
      <div class="hero-text">
        <div class="hero-label">Yummy Time</div>
        <h2>고객감사제<br>최대 시크릿특가</h2>
        <div class="sub">담을 때마다 2% 적립</div>
      </div>
    </div>

    <!-- Quick Menu - Fashion -->
    <div class="quick-menu">
      <div class="quick-item">
        <div class="quick-thumb" style="background:#fff3e0;">
          <div class="badge">15%</div>
          <span class="thumb-icon">🎟️</span>
        </div>
        <span>15%쿠폰</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb" style="background:#fce4ec;">
          <span class="thumb-icon">👚</span>
        </div>
        <span>여성</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb" style="background:#e3f2fd;">
          <span class="thumb-icon">👔</span>
        </div>
        <span>남성</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb" style="background:#f3e5f5;">
          <span class="thumb-icon">💎</span>
        </div>
        <span>럭셔리</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb" style="background:#efebe9;">
          <span class="thumb-icon">👜</span>
        </div>
        <span>백&amp;슈즈</span>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
