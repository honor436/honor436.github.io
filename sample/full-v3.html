<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>풀페이지 C - 텍스트 상단</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
    }
    .back-link {
      display: block;
      padding: 12px 16px;
      font-size: 14px;
      color: #777;
      text-decoration: none;
      background: #f5f5f5;
    }
    .back-link:hover { color: #111; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      background: #fff;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      color: #0c8050;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f2f2f2;
      border-radius: 20px;
      padding: 8px 14px;
      gap: 8px;
    }
    .search-bar input {
      border: none;
      background: transparent;
      font-size: 13px;
      color: #777;
      outline: none;
      flex: 1;
      font-family: inherit;
    }
    .cart-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Text Tab Bar */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      color: #999;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #111;
      font-weight: 700;
      border-bottom-color: #111;
    }

    /* Text First Hero */
    .text-hero {
      padding: 28px 20px 16px;
      background: #fff;
    }
    .text-hero .sub-title {
      font-size: 20px;
      color: #777;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .text-hero .main-title {
      font-size: 24px;
      font-weight: 800;
      color: #0c8050;
      line-height: 1.3;
    }

    /* Image Sections */
    .image-section {
      width: 100%;
    }
    .image-section img {
      width: 100%;
      display: block;
    }
    .image-placeholder {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .image-placeholder.food-1 {
      background: url('https://www.figma.com/api/mcp/asset/627b2325-7afb-44f5-980a-ce5f792f6e5d') center/cover no-repeat;
    }
    .image-placeholder.food-2 {
      height: 200px;
      background: url('https://www.figma.com/api/mcp/asset/627b2325-7afb-44f5-980a-ce5f792f6e5d') center 60%/cover no-repeat;
    }
    .image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,0.3) 100%);
      display: flex;
      align-items: flex-end;
      padding: 16px 20px;
    }
    .image-overlay .caption {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    /* Divider */
    .divider {
      height: 8px;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="app">
    <a href="../sample.html" class="back-link">← 목록으로</a>

    <!-- Header -->
    <div class="header">
      <div class="logo">CJ더마켓</div>
      <div class="search-bar">
        <input type="text" placeholder="검색어를 입력하세요" readonly>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="cart-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      </div>
    </div>

    <!-- Text Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item" data-tab="live">라이브</div>
      <div class="tab-item" data-tab="deals">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
      <div class="tab-item" data-tab="mag">매거진</div>
    </div>

    <!-- Text First Section -->
    <div class="text-hero">
      <div class="sub-title">최대 시크릿특가</div>
      <div class="main-title">고객감사제</div>
    </div>

    <!-- Image 1 -->
    <div class="image-section">
      <div class="image-placeholder food-1">
        <div class="image-overlay">
          <div class="caption">Yummy Time - 맛있는 시간</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Image 2 -->
    <div class="image-section">
      <div class="image-placeholder food-2">
        <div class="image-overlay">
          <div class="caption">엄선된 식재료로 만든 프리미엄 델리</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
