<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>풀페이지 E - 배너+탭+하단바 흰버튼</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding-bottom: 64px;
    }
    .back-link {
      display: block;
      padding: 12px 16px;
      font-size: 14px;
      color: #777;
      text-decoration: none;
      background: #f5f5f5;
    }
    .back-link:hover { color: #111; }

    /* Hero Banner */
    .hero {
      position: relative;
      width: 100%;
      height: 300px;
      background: url('https://www.figma.com/api/mcp/asset/c5520ee2-ba41-47c7-ab28-3f787889bfb9') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 24px 28px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.5) 100%);
    }
    .hero-search {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 2;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      cursor: pointer;
    }
    .hero-text {
      position: relative;
      z-index: 1;
    }
    .hero-text .label {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      font-weight: 500;
      margin-bottom: 6px;
    }
    .hero-text h2 {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 4px;
    }
    .hero-text .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 16px;
    }
    .hero-btn-white {
      display: inline-block;
      background: #fff;
      color: #111;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    /* Tab Bar */
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 0 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      color: #999;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #111;
      font-weight: 700;
      border-bottom-color: #111;
    }

    /* Quick Menu - Rectangular */
    .quick-menu {
      display: flex;
      gap: 8px;
      padding: 16px 16px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .quick-menu::-webkit-scrollbar { display: none; }
    .quick-rect {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      height: 72px;
      border-radius: 12px;
      background: #f5f5f5;
      cursor: pointer;
      gap: 4px;
      padding: 8px;
    }
    .quick-rect svg { width: 22px; height: 22px; }
    .quick-rect span {
      font-size: 10px;
      color: #333;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Category Chips */
    .category-chips {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .category-chips::-webkit-scrollbar { display: none; }
    .chip {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      background: #fff;
      color: #333;
      border: 1px solid #e0e0e0;
      transition: all 0.2s;
    }
    .chip.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 64px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 4px 0;
    }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item span {
      font-size: 10px;
      color: #777;
    }
    .nav-item.active span { color: #0c8050; }
    .nav-item.active svg { stroke: #0c8050; }
    .nav-item.center {
      position: relative;
      margin-top: -8px;
    }
    .nav-item.center .center-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #0c8050;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
    }
  </style>
</head>
<body>
  <div class="app">
    <a href="../sample.html" class="back-link">← 목록으로</a>

    <!-- Hero Banner (no header) -->
    <div class="hero">
      <div class="hero-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="hero-text">
        <div class="label">CJ더마켓 고객감사제</div>
        <h2>시크릿특가<br>오픈!</h2>
        <div class="sub">담을 때마다 2% 적립</div>
        <button class="hero-btn-white">혜택 받기</button>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="deals">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
      <div class="tab-item" data-tab="mag">매거진</div>
    </div>

    <!-- Quick Menu - Rectangular -->
    <div class="quick-menu">
      <div class="quick-rect">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0c8050" stroke-width="1.8"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span>슈팅배송</span>
      </div>
      <div class="quick-rect">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.8"><path d="M12 3C7 3 3 7 3 12h3l-4 5-4-5h3c0-6.1 4.9-11 11-11v4z"/><circle cx="17" cy="17" r="4"/></svg>
        <span>신선밥상</span>
      </div>
      <div class="quick-rect">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        <span>이마트</span>
      </div>
      <div class="quick-rect">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/></svg>
        <span>스마트장보기</span>
      </div>
      <div class="quick-rect">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>베스트</span>
      </div>
    </div>

    <!-- Category Chips -->
    <div class="category-chips">
      <div class="chip active">ALL 전체</div>
      <div class="chip">채소/두부</div>
      <div class="chip">과일</div>
      <div class="chip">생수/음료</div>
      <div class="chip">우유/유제품</div>
      <div class="chip">건강식품</div>
    </div>

    <!-- Placeholder content area -->
    <div style="padding:20px 16px; color:#999; font-size:13px; text-align:center; margin-top:40px;">
      상품 목록 영역
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item" data-nav="menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <span>메뉴</span>
    </div>
    <div class="nav-item" data-nav="wish">
      <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>찜</span>
    </div>
    <div class="nav-item center active" data-nav="home">
      <div class="center-logo">CJ THE<br>MARKET</div>
    </div>
    <div class="nav-item" data-nav="my">
      <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>마이</span>
    </div>
    <div class="nav-item" data-nav="recent">
      <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>최근본</span>
    </div>
  </div>

  <script>
    // Tab interaction
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // Chip interaction
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    // Bottom nav interaction
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => {
          n.classList.remove('active');
          const svg = n.querySelector('svg');
          if (svg) svg.setAttribute('stroke', '#777');
          const span = n.querySelector('span');
          if (span) span.style.color = '#777';
        });
        item.classList.add('active');
        const svg = item.querySelector('svg');
        if (svg) svg.setAttribute('stroke', '#0c8050');
        const span = item.querySelector('span');
        if (span) span.style.color = '#0c8050';
      });
    });
  </script>
</body>
</html>
