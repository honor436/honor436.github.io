<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CJ더마켓 - 홈 메인 A (탭 좌측 시작)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .back-link {
      display: block;
      max-width: 430px;
      margin: 0 auto;
      padding: 10px 16px;
      font-size: 14px;
      color: #0c8050;
      text-decoration: none;
      background: #fff;
    }
    .back-link:hover { text-decoration: underline; }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }
    /* Header */
    .header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo .cj { color: #0c8050; }
    .logo .market { color: #111; }
    /* Tab Bar */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 12px;
      background: #fff;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0;
      padding: 12px 10px;
      font-size: 14px;
      color: #777;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #111;
      font-weight: 700;
      border-bottom-color: #111;
    }
    /* Hero Carousel */
    .hero-section {
      padding: 16px;
      overflow-x: auto;
      display: flex;
      gap: 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .hero-section::-webkit-scrollbar { display: none; }
    .hero-card {
      flex-shrink: 0;
      width: 280px;
      height: 200px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #0c8050 0%, #0a6b43 100%);
    }
    .hero-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.25);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .hero-overlay .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .hero-overlay .subtitle {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 16px;
    }
    .hero-btn {
      display: inline-block;
      padding: 8px 24px;
      background: #0c8050;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    /* Quick Menu */
    .quick-menu {
      display: flex;
      overflow-x: auto;
      padding: 20px 16px;
      gap: 16px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .quick-menu::-webkit-scrollbar { display: none; }
    .quick-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .quick-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .quick-label {
      font-size: 11px;
      color: #333;
      white-space: nowrap;
    }
    /* Category Chips */
    .category-chips {
      display: flex;
      overflow-x: auto;
      padding: 12px 16px;
      gap: 8px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      border-top: 1px solid #e5e5e5;
    }
    .category-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #e5e5e5;
      font-size: 13px;
      color: #333;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .chip.active {
      background: #0c8050;
      color: #fff;
      border-color: #0c8050;
    }
    .chip:hover { border-color: #aaa; }
    .chip .emoji { font-size: 14px; }
    /* Section */
    .section-title {
      padding: 24px 16px 12px;
      font-size: 17px;
      font-weight: 700;
      color: #111;
    }
  </style>
</head>
<body>
  <a href="../sample.html" class="back-link">&larr; 목록으로</a>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo"><span class="cj">CJ</span><span class="market">더마켓</span></div>
    </div>
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item" data-tab="live">라이브</div>
      <div class="tab-item" data-tab="value">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
      <div class="tab-item" data-tab="mag">매거진</div>
    </div>
    <!-- Hero Carousel -->
    <div class="hero-section">
      <div class="hero-card">
        <img src="https://www.figma.com/api/mcp/asset/627b2325-7afb-44f5-980a-ce5f792f6e5d" alt="Yummy Time">
        <div class="hero-overlay">
          <div class="title">YUMMY TIME<br>그랜드 오픈</div>
          <button class="hero-btn">입장하기</button>
        </div>
      </div>
      <div class="hero-card" style="background: linear-gradient(135deg, #1a5c3a, #0c8050);">
        <div class="hero-overlay" style="background: none;">
          <div class="title">신선한 봄맞이<br>특별 할인</div>
          <div class="subtitle">최대 40% OFF</div>
          <button class="hero-btn">자세히 보기</button>
        </div>
      </div>
      <div class="hero-card" style="background: linear-gradient(135deg, #2d2d2d, #555);">
        <div class="hero-overlay" style="background: none;">
          <div class="title">프리미엄<br>디저트 컬렉션</div>
          <div class="subtitle">달콤한 시간</div>
          <button class="hero-btn">구경하기</button>
        </div>
      </div>
    </div>
    <!-- Quick Menu -->
    <div class="quick-menu">
      <div class="quick-item">
        <div class="quick-icon">🚀</div>
        <span class="quick-label">슈팅배송</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">🥗</div>
        <span class="quick-label">신선밥상</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">🛒</div>
        <span class="quick-label">이마트</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">📱</div>
        <span class="quick-label">스마트장보기</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon">🏆</div>
        <span class="quick-label">베스트</span>
      </div>
    </div>
    <!-- Category Chips -->
    <div class="category-chips">
      <div class="chip active"><span class="emoji">🏷</span> ALL 전체</div>
      <div class="chip"><span class="emoji">🥬</span> 채소/두부</div>
      <div class="chip"><span class="emoji">🍎</span> 과일</div>
      <div class="chip"><span class="emoji">💧</span> 생수/음료</div>
      <div class="chip"><span class="emoji">🥛</span> 우유/유제품</div>
      <div class="chip"><span class="emoji">💊</span> 건강식품</div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });
  </script>
</body>
</html>
