<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CJ더마켓 - 홈 메인 B (검색바+장바구니)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .back-link {
      display: block;
      max-width: 430px;
      margin: 0 auto;
      padding: 10px 16px;
      font-size: 14px;
      color: #0c8050;
      text-decoration: none;
      background: #fff;
    }
    .back-link:hover { text-decoration: underline; }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }
    .logo .cj { color: #0c8050; }
    .logo .market { color: #111; }
    .search-bar {
      flex: 1;
      height: 36px;
      background: #f2f2f2;
      border-radius: 18px;
      border: none;
      padding: 0 14px;
      font-size: 13px;
      color: #777;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .search-bar svg { flex-shrink: 0; }
    .search-bar span { color: #aaa; font-size: 13px; }
    .cart-btn {
      position: relative;
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .cart-badge {
      position: absolute;
      top: -2px;
      right: -4px;
      width: 16px;
      height: 16px;
      background: #e53935;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Tab Bar */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 12px;
      background: #fff;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0;
      padding: 12px 10px;
      font-size: 14px;
      color: #777;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #111;
      font-weight: 700;
      border-bottom-color: #111;
    }
    /* Hero */
    .hero-section {
      padding: 16px;
      overflow-x: auto;
      display: flex;
      gap: 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .hero-section::-webkit-scrollbar { display: none; }
    .hero-card {
      flex-shrink: 0;
      width: 280px;
      height: 200px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #0c8050, #0a6b43);
    }
    .hero-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.25);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .hero-overlay .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .hero-overlay .subtitle {
      font-size: 13px;
      opacity: 0.85;
    }
    /* Quick Menu Grid */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px 24px;
    }
    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .grid-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #0c8050;
    }
    .grid-icon.pink { background: #fce4ec; color: #e91e63; }
    .grid-icon.blue { background: #e3f2fd; color: #1976d2; }
    .grid-icon.green { background: #e8f5e9; color: #0c8050; }
    .grid-icon.orange { background: #fff3e0; color: #f57c00; }
    .grid-icon.purple { background: #f3e5f5; color: #7b1fa2; }
    .grid-icon.yellow { background: #fffde7; color: #f9a825; }
    .grid-label {
      font-size: 12px;
      color: #333;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <a href="../sample.html" class="back-link">&larr; 목록으로</a>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo"><span class="cj">CJ</span><span class="market">더마켓</span></div>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>검색어를 입력하세요</span>
      </div>
      <div class="cart-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <div class="cart-badge">3</div>
      </div>
    </div>
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="value">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
      <div class="tab-item" data-tab="mag">매거진</div>
    </div>
    <!-- Hero -->
    <div class="hero-section">
      <div class="hero-card">
        <img src="https://www.figma.com/api/mcp/asset/627b2325-7afb-44f5-980a-ce5f792f6e5d" alt="Yummy Time">
        <div class="hero-overlay">
          <div class="title">YUMMY TIME<br>그랜드 오픈</div>
          <div class="subtitle">담을 때마다 2% 적립</div>
        </div>
      </div>
      <div class="hero-card" style="background: linear-gradient(135deg, #1a5c3a, #0c8050);">
        <div class="hero-overlay" style="background:none;">
          <div class="title">봄 신선식품<br>기획전</div>
          <div class="subtitle">제철 과일 모음</div>
        </div>
      </div>
    </div>
    <!-- Quick Menu Grid -->
    <div class="quick-grid">
      <div class="grid-item">
        <div class="grid-icon green">₩</div>
        <span class="grid-label">3,900원</span>
      </div>
      <div class="grid-item">
        <div class="grid-icon yellow">P</div>
        <span class="grid-label">포켓몬에디션</span>
      </div>
      <div class="grid-item">
        <div class="grid-icon pink">B</div>
        <span class="grid-label">뷰티소품할인</span>
      </div>
      <div class="grid-item">
        <div class="grid-icon blue">C</div>
        <span class="grid-label">봄 클렌징</span>
      </div>
      <div class="grid-item">
        <div class="grid-icon purple">G</div>
        <span class="grid-label">가나디콜라보</span>
      </div>
      <div class="grid-item">
        <div class="grid-icon orange">S</div>
        <span class="grid-label">선크림1+1</span>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
