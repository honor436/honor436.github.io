<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CJ더마켓 - 홈 메인 F (문화/공연 퀵메뉴)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .back-link {
      display: block;
      max-width: 430px;
      margin: 0 auto;
      padding: 10px 16px;
      font-size: 14px;
      color: #0c8050;
      text-decoration: none;
      background: #fff;
    }
    .back-link:hover { text-decoration: underline; }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }
    .header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo .cj { color: #0c8050; }
    .logo .market { color: #111; }
    .tab-bar {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 12px;
      background: #fff;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0;
      padding: 12px 10px;
      font-size: 14px;
      color: #777;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #111;
      font-weight: 700;
      border-bottom-color: #111;
    }
    /* Hero - 2 Banner Slide */
    .hero-slide {
      padding: 16px;
      overflow-x: auto;
      display: flex;
      gap: 10px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .hero-slide::-webkit-scrollbar { display: none; }
    .banner-card {
      flex-shrink: 0;
      width: calc(100% - 48px);
      min-width: 260px;
      height: 160px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      scroll-snap-align: start;
    }
    .banner-card.yummy {
      background: linear-gradient(135deg, #0c8050, #0a6b43);
    }
    .banner-card.yummy img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
    }
    .banner-card.sale {
      background: linear-gradient(135deg, #1a3a2a, #0d2a1e);
    }
    .banner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .banner-overlay .tag {
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
      width: fit-content;
    }
    .banner-overlay .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .banner-overlay .subtitle {
      font-size: 12px;
      opacity: 0.85;
    }
    .neon-text {
      font-size: 26px;
      font-weight: 900;
      color: #4ade80;
      text-shadow: 0 0 10px rgba(74,222,128,0.6), 0 0 30px rgba(74,222,128,0.3);
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .slide-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px 0 4px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ddd;
    }
    .dot.active { background: #0c8050; width: 16px; border-radius: 3px; }
    /* Quick Menu - Culture/Performance */
    .quick-menu {
      display: flex;
      overflow-x: auto;
      padding: 24px 16px;
      gap: 20px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      justify-content: space-between;
    }
    .quick-menu::-webkit-scrollbar { display: none; }
    .quick-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .quick-icon-svg {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: border-color 0.2s;
    }
    .quick-item:hover .quick-icon-svg { border-color: #0c8050; }
    .quick-icon-svg svg {
      width: 24px;
      height: 24px;
    }
    .quick-label {
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <a href="../sample.html" class="back-link">&larr; 목록으로</a>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="logo"><span class="cj">CJ</span><span class="market">더마켓</span></div>
    </div>
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="home">홈</div>
      <div class="tab-item" data-tab="value">실속장보기</div>
      <div class="tab-item" data-tab="new">신상발견</div>
      <div class="tab-item" data-tab="best">베스트</div>
      <div class="tab-item" data-tab="event">이벤트</div>
      <div class="tab-item" data-tab="mag">매거진</div>
    </div>
    <!-- Hero - 2 Banner Cards -->
    <div class="hero-slide" id="heroSlide">
      <div class="banner-card yummy">
        <img src="https://www.figma.com/api/mcp/asset/627b2325-7afb-44f5-980a-ce5f792f6e5d" alt="Yummy Time">
        <div class="banner-overlay" style="background: rgba(0,0,0,0.2);">
          <div class="tag">NEW</div>
          <div class="title">YUMMY TIME<br>그랜드 오픈</div>
          <div class="subtitle">담을 때마다 2% 적립</div>
        </div>
      </div>
      <div class="banner-card sale">
        <div class="banner-overlay">
          <div class="tag">EVENT</div>
          <div class="neon-text">4월 더세페</div>
          <div class="subtitle">더마켓 세일 페스타 최대 70%</div>
        </div>
      </div>
    </div>
    <div class="slide-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
    <!-- Quick Menu - Culture/Performance SVG Icons -->
    <div class="quick-menu">
      <div class="quick-item">
        <div class="quick-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <span class="quick-label">뮤지컬</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 00-3 3v7a3 3 0 006 0V5a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </div>
        <span class="quick-label">콘서트</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        <span class="quick-label">스포츠</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
            <path d="M9 9l12-2"/>
          </svg>
        </div>
        <span class="quick-label">클래식/무용</span>
      </div>
      <div class="quick-item">
        <div class="quick-icon-svg">
          <svg viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
            <line x1="4" y1="22" x2="4" y2="15"/>
            <circle cx="16" cy="9" r="2"/>
            <path d="M12 6l2 2-2 2"/>
          </svg>
        </div>
        <span class="quick-label">연극</span>
      </div>
    </div>
    <!-- No category chips in v6 -->
  </div>
  <script>
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
    const heroSlide = document.getElementById('heroSlide');
    const dots = document.querySelectorAll('.dot');
    heroSlide.addEventListener('scroll', () => {
      const scrollLeft = heroSlide.scrollLeft;
      const cardWidth = heroSlide.querySelector('.banner-card').offsetWidth + 10;
      const idx = Math.round(scrollLeft / cardWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    });
  </script>
</body>
</html>
