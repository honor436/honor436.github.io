<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ더마켓 - 고객감사제 A</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    -webkit-font-smoothing: antialiased;
  }
  .wrapper {
    max-width: 430px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
    position: relative;
  }
  .back-link {
    display: block;
    padding: 12px 16px;
    font-size: 14px;
    color: #0c8050;
    text-decoration: none;
    background: #f5f5f5;
  }
  .back-link:hover { text-decoration: underline; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #0c8050;
    gap: 10px;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    letter-spacing: -0.5px;
  }
  .search-bar {
    flex: 1;
    height: 36px;
    border-radius: 18px;
    background: rgba(255,255,255,0.25);
    border: none;
    padding: 0 14px;
    font-size: 13px;
    color: #fff;
    outline: none;
  }
  .search-bar::placeholder { color: rgba(255,255,255,0.6); }
  .cart-icon {
    width: 28px;
    height: 28px;
    position: relative;
    cursor: pointer;
  }
  .cart-icon svg { fill: #fff; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    background: #0c8050;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-item.active {
    color: #fff;
    font-weight: 700;
    border-bottom-color: #fff;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #0c8050 0%, #065c38 100%);
    padding: 32px 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 200px;
    overflow: hidden;
  }
  .hero-text {
    flex: 1;
  }
  .hero-title {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    line-height: 1.35;
    letter-spacing: -0.5px;
  }
  .hero-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.8);
    margin-top: 6px;
  }
  .hero-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 22px;
    background: #fff;
    color: #0c8050;
    font-size: 14px;
    font-weight: 700;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .hero-btn:active { transform: scale(0.96); }

  /* Envelope graphic */
  .envelope-wrap {
    flex-shrink: 0;
    width: 140px;
    height: 160px;
    position: relative;
    margin-left: 12px;
  }
  .envelope {
    width: 120px;
    height: 150px;
    background: linear-gradient(145deg, #1a3a2a 0%, #0d2218 100%);
    border-radius: 12px;
    position: absolute;
    right: 0;
    top: 5px;
    transform: rotate(8deg);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .envelope::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #e4bf89, #d4a060, #e4bf89);
  }
  .envelope-sale {
    font-size: 32px;
    font-weight: 900;
    color: #e4bf89;
    letter-spacing: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .envelope-label {
    font-size: 12px;
    color: #e4bf89;
    margin-top: 6px;
    letter-spacing: 2px;
    opacity: 0.85;
  }
  .envelope-line {
    width: 50px;
    height: 1px;
    background: rgba(228,191,137,0.4);
    margin: 8px 0;
  }

  /* Quick menu */
  .quick-section {
    background: #fff;
    padding: 20px 0 16px;
  }
  .quick-scroll {
    display: flex;
    gap: 16px;
    padding: 0 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-scroll::-webkit-scrollbar { display: none; }
  .quick-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .quick-thumb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    overflow: hidden;
  }
  .quick-thumb-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }
  .quick-label {
    font-size: 12px;
    color: #333;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Placeholder section */
  .content-section {
    background: #f5f5f5;
    padding: 16px;
  }
  .placeholder-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <a href="../sample.html" class="back-link">&larr; 목록으로</a>

  <!-- Header -->
  <div class="header">
    <div class="logo">CJ더마켓</div>
    <input type="text" class="search-bar" placeholder="검색어를 입력하세요">
    <div class="cart-icon">
      <svg viewBox="0 0 24 24" width="28" height="28"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.04 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25z" fill="white"/></svg>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tabBar">
    <div class="tab-item" data-tab="home">홈</div>
    <div class="tab-item" data-tab="value">실속장보기</div>
    <div class="tab-item" data-tab="new">신상발견</div>
    <div class="tab-item active" data-tab="best">베스트</div>
    <div class="tab-item" data-tab="event">이벤트</div>
    <div class="tab-item" data-tab="magazine">매거진</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-text">
      <div class="hero-title">고객감사제<br>최대 시크릿특가</div>
      <button class="hero-btn">혜택 받기</button>
    </div>
    <div class="envelope-wrap">
      <div class="envelope">
        <div class="envelope-line"></div>
        <div class="envelope-sale">SALE</div>
        <div class="envelope-line"></div>
        <div class="envelope-label">특별 혜택</div>
        <div class="envelope-line"></div>
      </div>
    </div>
  </div>

  <!-- Quick menu -->
  <div class="quick-section">
    <div class="quick-scroll">
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#f7c59f,#e8a87c)"></div></div>
        <span class="quick-label">현대식품관</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#c5a3ff,#8b5cf6)"></div></div>
        <span class="quick-label">패션</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#fca5a5,#ef4444)"></div></div>
        <span class="quick-label">뷰티</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#93c5fd,#3b82f6)"></div></div>
        <span class="quick-label">이머징</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#86efac,#22c55e)"></div></div>
        <span class="quick-label">리빙</span>
      </div>
    </div>
  </div>

  <!-- Placeholder content -->
  <div class="content-section">
    <div class="placeholder-card">
      추천 상품이 여기에 표시됩니다
    </div>
  </div>
</div>

<script>
  document.getElementById('tabBar').addEventListener('click', function(e) {
    const tab = e.target.closest('.tab-item');
    if (!tab) return;
    this.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
</script>
</body>
</html>
