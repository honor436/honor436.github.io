<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ더마켓 - 고객감사제 B</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    -webkit-font-smoothing: antialiased;
  }
  .wrapper {
    max-width: 430px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
  }
  .back-link {
    display: block;
    padding: 12px 16px;
    font-size: 14px;
    color: #0c8050;
    text-decoration: none;
    background: #f5f5f5;
  }
  .back-link:hover { text-decoration: underline; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #fff;
    border-bottom: 1px solid #eee;
    gap: 10px;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    color: #0c8050;
    white-space: nowrap;
    letter-spacing: -0.5px;
  }
  .search-bar {
    flex: 1;
    height: 36px;
    border-radius: 18px;
    background: #f5f5f5;
    border: none;
    padding: 0 14px;
    font-size: 13px;
    color: #333;
    outline: none;
  }
  .search-bar::placeholder { color: #999; }
  .cart-icon svg { fill: #333; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    background: #fff;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-bottom: 1px solid #eee;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    flex-shrink: 0;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #777;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-item.active {
    color: #0c8050;
    font-weight: 700;
    border-bottom-color: #0c8050;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #8b9a6f 0%, #6b7a50 100%);
    padding: 32px 20px 36px;
    min-height: 200px;
  }
  .hero-eyebrow {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hero-title {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    line-height: 1.35;
    letter-spacing: -0.5px;
  }
  .hero-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    margin-top: 8px;
    font-weight: 500;
  }
  .hero-btn {
    display: inline-block;
    margin-top: 18px;
    padding: 11px 24px;
    background: #fff;
    color: #111;
    font-size: 14px;
    font-weight: 700;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .hero-btn:active { transform: scale(0.96); }

  /* Quick menu - rectangular */
  .quick-section {
    background: #fff;
    padding: 16px 0;
  }
  .quick-scroll {
    display: flex;
    gap: 10px;
    padding: 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-scroll::-webkit-scrollbar { display: none; }
  .quick-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    border-radius: 14px;
    background: #f5f5f5;
    gap: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .quick-card:active { background: #eee; }
  .quick-card-icon {
    font-size: 22px;
  }
  .quick-card-label {
    font-size: 11px;
    color: #333;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Category chips */
  .chip-section {
    padding: 12px 0;
    background: #fff;
  }
  .chip-scroll {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .chip-scroll::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    background: #f5f5f5;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .chip.active {
    background: #0c8050;
    color: #fff;
    font-weight: 600;
  }

  /* Content */
  .content-section {
    background: #f5f5f5;
    padding: 16px;
  }
  .placeholder-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <a href="../sample.html" class="back-link">&larr; 목록으로</a>

  <!-- Header -->
  <div class="header">
    <div class="logo">CJ더마켓</div>
    <input type="text" class="search-bar" placeholder="검색어를 입력하세요">
    <div class="cart-icon">
      <svg viewBox="0 0 24 24" width="28" height="28"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.04 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25z" fill="#333"/></svg>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" data-tab="home">홈</div>
    <div class="tab-item" data-tab="value">실속장보기</div>
    <div class="tab-item" data-tab="new">신상발견</div>
    <div class="tab-item" data-tab="best">베스트</div>
    <div class="tab-item" data-tab="event">이벤트</div>
    <div class="tab-item" data-tab="magazine">매거진</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-title">고객감사제<br>시크릿특가 오픈</div>
    <div class="hero-subtitle">담을 때마다 2% 적립</div>
    <button class="hero-btn">적립금 받기</button>
  </div>

  <!-- Quick menu -->
  <div class="quick-section">
    <div class="quick-scroll">
      <div class="quick-card">
        <div class="quick-card-icon">&#x1F69A;</div>
        <span class="quick-card-label">슈팅배송</span>
      </div>
      <div class="quick-card">
        <div class="quick-card-icon">&#x1F35A;</div>
        <span class="quick-card-label">신선밥상</span>
      </div>
      <div class="quick-card">
        <div class="quick-card-icon">&#x1F3EA;</div>
        <span class="quick-card-label">이마트</span>
      </div>
      <div class="quick-card">
        <div class="quick-card-icon">&#x1F6D2;</div>
        <span class="quick-card-label">스마트장보기</span>
      </div>
      <div class="quick-card">
        <div class="quick-card-icon">&#x1F3C6;</div>
        <span class="quick-card-label">베스트</span>
      </div>
    </div>
  </div>

  <!-- Category chips -->
  <div class="chip-section">
    <div class="chip-scroll" id="chipScroll">
      <button class="chip active" data-chip="all">ALL 전체</button>
      <button class="chip" data-chip="veg">채소/두부</button>
      <button class="chip" data-chip="fruit">과일</button>
      <button class="chip" data-chip="water">생수/음료</button>
      <button class="chip" data-chip="milk">우유/유제품</button>
      <button class="chip" data-chip="health">건강식품</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content-section">
    <div class="placeholder-card">
      카테고리별 상품이 여기에 표시됩니다
    </div>
  </div>
</div>

<script>
  document.getElementById('tabBar').addEventListener('click', function(e) {
    const tab = e.target.closest('.tab-item');
    if (!tab) return;
    this.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });

  document.getElementById('chipScroll').addEventListener('click', function(e) {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    this.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
</script>
</body>
</html>
