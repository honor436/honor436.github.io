<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ더마켓 - 고객감사제 C</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    -webkit-font-smoothing: antialiased;
  }
  .wrapper {
    max-width: 430px;
    margin: 0 auto;
    background: #fff;
    min-height: 100vh;
  }
  .back-link {
    display: block;
    padding: 12px 16px;
    font-size: 14px;
    color: #0c8050;
    text-decoration: none;
    background: #f5f5f5;
  }
  .back-link:hover { text-decoration: underline; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #fff;
    border-bottom: 1px solid #eee;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    color: #0c8050;
    letter-spacing: -0.5px;
  }
  .header-icons {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .icon-btn {
    width: 28px;
    height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn svg { fill: #333; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    background: #fff;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-bottom: 1px solid #eee;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    flex-shrink: 0;
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #777;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-item.active {
    color: #0c8050;
    font-weight: 700;
    border-bottom-color: #0c8050;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #87CEEB 0%, #5BA3D9 100%);
    padding: 32px 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 200px;
    overflow: hidden;
  }
  .hero-text { flex: 1; }
  .hero-title {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    line-height: 1.35;
    letter-spacing: -0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .hero-btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 22px;
    background: #fff;
    color: #333;
    font-size: 14px;
    font-weight: 700;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .hero-btn:active { transform: scale(0.96); }

  /* Neon banner */
  .neon-banner {
    flex-shrink: 0;
    width: 130px;
    height: 150px;
    margin-left: 12px;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }
  .neon-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    border: 1px solid rgba(0,255,200,0.15);
  }
  .neon-text {
    font-size: 36px;
    font-weight: 900;
    color: #00ffc8;
    text-shadow:
      0 0 8px rgba(0,255,200,0.6),
      0 0 20px rgba(0,255,200,0.4),
      0 0 40px rgba(0,255,200,0.2);
    letter-spacing: 2px;
    line-height: 1.1;
  }
  .neon-sub {
    font-size: 11px;
    color: rgba(0,255,200,0.7);
    margin-top: 8px;
    letter-spacing: 3px;
    font-weight: 600;
  }
  .neon-glow {
    position: absolute;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, rgba(0,255,200,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Quick menu */
  .quick-section {
    background: #fff;
    padding: 20px 0 16px;
  }
  .quick-scroll {
    display: flex;
    gap: 16px;
    padding: 0 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-scroll::-webkit-scrollbar { display: none; }
  .quick-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .quick-thumb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    overflow: hidden;
  }
  .quick-thumb-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
  }
  .quick-label {
    font-size: 12px;
    color: #333;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Content */
  .content-section {
    background: #f5f5f5;
    padding: 16px;
  }
  .placeholder-card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <a href="../sample.html" class="back-link">&larr; 목록으로</a>

  <!-- Header -->
  <div class="header">
    <div class="logo">CJ더마켓</div>
    <div class="header-icons">
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#333"/></svg>
      </div>
      <div class="icon-btn">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.04 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25z" fill="#333"/></svg>
      </div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tabBar">
    <div class="tab-item" data-tab="home">홈</div>
    <div class="tab-item" data-tab="value">실속장보기</div>
    <div class="tab-item" data-tab="new">신상발견</div>
    <div class="tab-item active" data-tab="best">베스트</div>
    <div class="tab-item" data-tab="event">이벤트</div>
    <div class="tab-item" data-tab="magazine">매거진</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-text">
      <div class="hero-title">고객감사제<br>최대 시크릿특가</div>
      <button class="hero-btn">혜택 받기</button>
    </div>
    <div class="neon-banner">
      <div class="neon-glow"></div>
      <div class="neon-text">더<br>세<br>페</div>
      <div class="neon-sub">SALE</div>
    </div>
  </div>

  <!-- Quick menu -->
  <div class="quick-section">
    <div class="quick-scroll">
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#f7c59f,#e8a87c)"></div></div>
        <span class="quick-label">현대식품관</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#c5a3ff,#8b5cf6)"></div></div>
        <span class="quick-label">패션</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#fca5a5,#ef4444)"></div></div>
        <span class="quick-label">뷰티</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#93c5fd,#3b82f6)"></div></div>
        <span class="quick-label">이머징</span>
      </div>
      <div class="quick-item">
        <div class="quick-thumb"><div class="quick-thumb-inner" style="background:linear-gradient(135deg,#86efac,#22c55e)"></div></div>
        <span class="quick-label">리빙</span>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content-section">
    <div class="placeholder-card">
      추천 상품이 여기에 표시됩니다
    </div>
  </div>
</div>

<script>
  document.getElementById('tabBar').addEventListener('click', function(e) {
    const tab = e.target.closest('.tab-item');
    if (!tab) return;
    this.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
</script>
</body>
</html>
