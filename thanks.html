<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CJ더마켓 - 고객감사제</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f5;
      color: #111;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    .app {
      max-width: 393px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      overflow-x: hidden;
    }

    /* ===== Header ===== */
    .header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      flex-shrink: 0;
    }

    .logo img {
      height: 20px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.3px;
    }
    .logo-text em {
      font-style: normal;
      color: #2b9e3f;
    }

    .search-bar {
      flex: 1;
      max-width: 200px;
      height: 30px;
      background: #f5f5f5;
      border-radius: 40px;
      margin: 0 12px;
      display: flex;
      align-items: center;
      padding: 0 12px;
    }

    .search-bar svg {
      width: 14px;
      height: 14px;
      color: #999;
      flex-shrink: 0;
    }

    .search-bar input {
      border: none;
      background: none;
      outline: none;
      font-size: 13px;
      color: #111;
      width: 100%;
      margin-left: 6px;
      font-family: inherit;
    }

    .search-bar input::placeholder {
      color: #bbb;
    }

    .header-cart {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      color: #111;
      cursor: pointer;
      position: relative;
    }

    .header-cart svg {
      width: 22px;
      height: 22px;
    }

    /* ===== Tab Bar ===== */
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 0 15px;
      background: #fff;
      gap: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 10px 10px 11px;
      font-size: 15px;
      font-weight: 500;
      color: #111;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
      text-align: center;
    }
    .tab.on {
      font-weight: 700;
    }
    .tab.on::after {
      content: '';
      position: absolute;
      left: 10px; right: 10px; bottom: 0;
      height: 2px;
      background: #111;
      border-radius: 1px;
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 360 / 520;
      overflow: hidden;
    }

    .hero-bg {
      width: 130%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      object-fit: cover;
    }

    .hero-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, #fff 75%);
      z-index: 2;
    }

    .hero-text {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 3;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 700;
      color: #000;
      line-height: 1.3;
      letter-spacing: -0.5px;
    }

    .hero-desc {
      font-size: 13px;
      color: rgba(17,17,17,0.8);
      margin-top: 8px;
      letter-spacing: -0.5px;
    }

    /* ===== Quick Category ===== */
    .quick-section {
      padding: 16px 0 24px;
      background: #fff;
    }

    .quick-track {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px;
    }
    .quick-track::-webkit-scrollbar { display: none; }

    .qi {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 72px;
      cursor: pointer;
    }
    .qi:active { opacity: 0.7; }

    .qi-thumb {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #f8f8f8;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qi-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .qi-thumb .emoji {
      font-size: 32px;
    }

    .qi-name {
      font-size: 12px;
      color: #333;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-text"><em>CJ</em>더마켓</span>
    </div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="10.5" cy="10.5" r="6"/>
        <line x1="21" y1="21" x2="15" y2="15"/>
      </svg>
      <input type="text" placeholder="검색어를 입력하세요">
    </div>
    <div class="header-cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 7h14l-1.5 12h-11L5 7z"/>
        <path d="M9 7V5a3 3 0 0 1 6 0v2"/>
      </svg>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <div class="tab">라이브</div>
    <div class="tab">실속장보기</div>
    <div class="tab">신상발견</div>
    <div class="tab on">홈</div>
    <div class="tab">베스트</div>
    <div class="tab">이벤트</div>
    <div class="tab">매거진</div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <img class="hero-bg" src="https://www.figma.com/api/mcp/asset/2fb2c3a4-3947-43a9-ae89-e8ac545ea53b" alt="Yummy Time">
    <div class="hero-fade"></div>
    <div class="hero-text">
      <div class="hero-title">고객감사제<br>최대 시크릿특가</div>
      <div class="hero-desc">담을 때마다 2% 적립</div>
    </div>
  </section>

  <!-- Quick Category -->
  <section class="quick-section">
    <div class="quick-track">
      <div class="qi">
        <div class="qi-thumb"><span class="emoji">🏷️</span></div>
        <div class="qi-name">15%쿠폰</div>
      </div>
      <div class="qi">
        <div class="qi-thumb"><span class="emoji">👚</span></div>
        <div class="qi-name">여성</div>
      </div>
      <div class="qi">
        <div class="qi-thumb"><span class="emoji">👔</span></div>
        <div class="qi-name">남성</div>
      </div>
      <div class="qi">
        <div class="qi-thumb"><span class="emoji">💎</span></div>
        <div class="qi-name">럭셔리</div>
      </div>
      <div class="qi">
        <div class="qi-thumb"><span class="emoji">👜</span></div>
        <div class="qi-name">백&슈즈</div>
      </div>
      <div class="qi">
        <div class="qi-thumb"><span class="emoji">🏠</span></div>
        <div class="qi-name">홈</div>
      </div>
    </div>
  </section>

</div>

<script>
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
    });
  });
</script>

</body>
</html>
